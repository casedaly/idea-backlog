<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Idea Backlog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #111;
    }

    header p {
      margin-top: 6px;
      color: #888;
      font-size: 0.95rem;
    }

    .capture-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 24px;
      width: 100%;
      max-width: 640px;
    }

    textarea {
      width: 100%;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 1rem;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      background: #fafafa;
      color: #1a1a1a;
      line-height: 1.6;
      min-height: 100px;
    }

    textarea:focus {
      border-color: #6c63ff;
      background: #fff;
    }

    textarea::placeholder { color: #bbb; }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #6c63ff;
      color: #fff;
      flex: 1;
    }

    .btn-primary:hover { background: #5a52e0; }
    .btn-primary:disabled { background: #c5c2f5; cursor: not-allowed; }

    .btn-mic {
      background: #f0f0f0;
      color: #555;
      padding: 10px 16px;
      position: relative;
    }

    .btn-mic:hover { background: #e5e5e5; }

    .btn-mic.listening {
      background: #fff0f0;
      color: #e53e3e;
      box-shadow: 0 0 0 3px rgba(229,62,62,0.2);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(229,62,62,0.2); }
      50%       { box-shadow: 0 0 0 6px rgba(229,62,62,0.08); }
    }

    .mic-icon, .add-icon { font-size: 1.05rem; }

    /* Backlog */
    .backlog-section {
      width: 100%;
      max-width: 640px;
      margin-top: 36px;
    }

    .backlog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .backlog-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .badge {
      background: #6c63ff;
      color: #fff;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 9px;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #bbb;
      font-size: 0.8rem;
      cursor: pointer;
      transition: color 0.15s;
    }

    .clear-btn:hover { color: #e53e3e; }

    .ideas-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .idea-item {
      background: #fff;
      border-radius: 12px;
      padding: 16px 18px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      display: flex;
      align-items: flex-start;
      gap: 14px;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .idea-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6c63ff;
      margin-top: 7px;
      flex-shrink: 0;
    }

    .idea-content {
      flex: 1;
    }

    .idea-text {
      font-size: 0.97rem;
      line-height: 1.55;
      color: #222;
    }

    .idea-meta {
      font-size: 0.75rem;
      color: #bbb;
      margin-top: 5px;
    }

    .idea-delete {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .idea-delete:hover { color: #e53e3e; background: #fff0f0; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #ccc;
      font-size: 0.9rem;
    }

    .empty-state span { display: block; font-size: 2rem; margin-bottom: 10px; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.875rem;
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .no-voice-msg {
      font-size: 0.78rem;
      color: #e09a00;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>Idea Backlog</h1>
    <p>Capture every spark before it fades.</p>
  </header>

  <div class="capture-card">
    <textarea id="ideaInput" placeholder="What's on your mind?" rows="4"></textarea>
    <p class="no-voice-msg" id="noVoiceMsg">Voice input not supported in this browser. Try Chrome or Edge.</p>
    <div class="actions">
      <button class="btn btn-mic" id="micBtn" title="Hold to speak">
        <span class="mic-icon">🎙️</span>
        <span id="micLabel">Voice</span>
      </button>
      <button class="btn btn-primary" id="addBtn">
        <span class="add-icon">＋</span> Add Idea
      </button>
    </div>
  </div>

  <section class="backlog-section">
    <div class="backlog-header">
      <h2>Backlog <span class="badge" id="countBadge">0</span></h2>
      <button class="clear-btn" id="clearBtn">Clear all</button>
    </div>
    <div class="ideas-list" id="ideasList">
      <div class="empty-state">
        <span>💡</span>
        No ideas yet — add your first one!
      </div>
    </div>
  </section>

  <div id="toast"></div>

<script>
  // ── Storage ──────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'idea-backlog-v1';

  function loadIdeas() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function saveIdeas(ideas) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(ideas));
  }

  let ideas = loadIdeas();

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const input      = document.getElementById('ideaInput');
  const addBtn     = document.getElementById('addBtn');
  const micBtn     = document.getElementById('micBtn');
  const micLabel   = document.getElementById('micLabel');
  const list       = document.getElementById('ideasList');
  const countBadge = document.getElementById('countBadge');
  const clearBtn   = document.getElementById('clearBtn');
  const noVoiceMsg = document.getElementById('noVoiceMsg');
  const toast      = document.getElementById('toast');

  // ── Render ────────────────────────────────────────────────────────────────
  function render() {
    countBadge.textContent = ideas.length;

    if (ideas.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <span>💡</span>
          No ideas yet — add your first one!
        </div>`;
      return;
    }

    list.innerHTML = ideas
      .slice()
      .reverse()
      .map((idea, revIdx) => {
        const idx = ideas.length - 1 - revIdx;
        const date = new Date(idea.ts).toLocaleString(undefined, {
          month: 'short', day: 'numeric',
          hour: 'numeric', minute: '2-digit'
        });
        return `
          <div class="idea-item" data-idx="${idx}">
            <div class="idea-dot"></div>
            <div class="idea-content">
              <div class="idea-text">${escHtml(idea.text)}</div>
              <div class="idea-meta">${date}</div>
            </div>
            <button class="idea-delete" data-idx="${idx}" title="Delete">✕</button>
          </div>`;
      })
      .join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Add idea ──────────────────────────────────────────────────────────────
  function addIdea() {
    const text = input.value.trim();
    if (!text) { showToast('Type or speak an idea first.'); return; }
    ideas.push({ text, ts: Date.now() });
    saveIdeas(ideas);
    render();
    input.value = '';
    input.focus();
    showToast('Idea added!');
  }

  addBtn.addEventListener('click', addIdea);

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) addIdea();
  });

  // ── Delete / clear ────────────────────────────────────────────────────────
  list.addEventListener('click', e => {
    const btn = e.target.closest('.idea-delete');
    if (!btn) return;
    const idx = parseInt(btn.dataset.idx, 10);
    ideas.splice(idx, 1);
    saveIdeas(ideas);
    render();
  });

  clearBtn.addEventListener('click', () => {
    if (ideas.length === 0) return;
    if (confirm('Delete all ideas? This cannot be undone.')) {
      ideas = [];
      saveIdeas(ideas);
      render();
    }
  });

  // ── Toast ─────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  // ── Voice / Speech Recognition ────────────────────────────────────────────
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    micBtn.disabled = true;
    micBtn.title = 'Voice input not supported in this browser';
    noVoiceMsg.style.display = 'block';
  } else {
    const recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    let listening = false;
    let baseText = '';   // text already in box before voice starts
    let interim = '';    // interim voice result

    function startListening() {
      if (listening) return;
      baseText = input.value;
      interim = '';
      recognition.start();
    }

    function stopListening() {
      if (!listening) return;
      recognition.stop();
    }

    recognition.onstart = () => {
      listening = true;
      micBtn.classList.add('listening');
      micLabel.textContent = 'Stop';
    };

    recognition.onresult = e => {
      let interimAcc = '';
      let finalAcc = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalAcc += t;
        else interimAcc += t;
      }
      if (finalAcc) {
        baseText = (baseText + ' ' + finalAcc).trim();
      }
      interim = interimAcc;
      input.value = interim ? (baseText + ' ' + interim).trim() : baseText;
    };

    recognition.onend = () => {
      listening = false;
      interim = '';
      micBtn.classList.remove('listening');
      micLabel.textContent = 'Voice';
      // Trim the final value
      input.value = input.value.trim();
    };

    recognition.onerror = e => {
      if (e.error !== 'aborted') showToast('Mic error: ' + e.error);
    };

    micBtn.addEventListener('click', () => {
      if (listening) stopListening();
      else startListening();
    });
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  render();
  input.focus();
</script>
</body>
</html>
